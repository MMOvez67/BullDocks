<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: Bulldogge (stilisiert) -->
  <g id="bulldog-icon">
    <!-- Kopf -->
    <circle cx="30" cy="30" r="18" fill="#1a1a1a"/>
    <!-- Ohren -->
    <circle cx="18" cy="15" r="6" fill="#1a1a1a"/>
    <circle cx="42" cy="15" r="6" fill="#1a1a1a"/>
    <!-- Maul -->
    <rect x="22" y="35" width="16" height="8" rx="2" fill="#1a1a1a"/>
    <!-- Augen -->
    <circle cx="24" cy="28" r="2.5" fill="white"/>
    <circle cx="36" cy="28" r="2.5" fill="white"/>
    <!-- Nase -->
    <ellipse cx="30" cy="36" rx="2" ry="1.5" fill="white"/>
  </g>
  
  <!-- Dartpfeil (diagonal) -->
  <g id="dart-arrow" transform="translate(35, 15) rotate(-35)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="25,0 28,0 26.5,-2.5 26.5,2.5" fill="#ff6b35"/>
    <polygon points="-2,0 0,-2.5 0,2.5" fill="#ff6b35" opacity="0.6"/>
  </g>
</svg>
