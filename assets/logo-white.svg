<svg viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: Bulldogge (stilisiert) -->
  <g id="bulldog-icon">
    <!-- Kopf -->
    <circle cx="30" cy="30" r="18" fill="white"/>
    <!-- Ohren -->
    <circle cx="18" cy="15" r="6" fill="white"/>
    <circle cx="42" cy="15" r="6" fill="white"/>
    <!-- Maul -->
    <rect x="22" y="35" width="16" height="8" rx="2" fill="white"/>
    <!-- Augen -->
    <circle cx="24" cy="28" r="2.5" fill="#1a1a1a"/>
    <circle cx="36" cy="28" r="2.5" fill="#1a1a1a"/>
    <!-- Nase -->
    <ellipse cx="30" cy="36" rx="2" ry="1.5" fill="#1a1a1a"/>
  </g>
  
  <!-- Dartpfeil (diagonal über Bulldogge) -->
  <g id="dart-arrow" transform="translate(35, 15) rotate(-35)">
    <!-- Pfeilschaft -->
    <line x1="0" y1="0" x2="25" y2="0" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Pfeilspitze -->
    <polygon points="25,0 28,0 26.5,-2.5 26.5,2.5" fill="#ff6b35"/>
    <!-- Federschmuck -->
    <polygon points="-2,0 0,-2.5 0,2.5" fill="#ff6b35" opacity="0.6"/>
  </g>
  
  <!-- Trennlinie -->
  <line x1="68" y1="10" x2="68" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Wortmarke & Tagline -->
  <text x="72" y="36" font-family="'Bebas Neue', sans-serif" font-size="26" font-weight="900" fill="white" letter-spacing="0.5">BULLDOCKS</text>
  <text x="72" y="50" font-family="'DM Sans', sans-serif" font-size="8" font-weight="500" letter-spacing="2.5" fill="rgba(255,255,255,0.6)" text-transform="uppercase">DART. OHNE BOHREN.</text>
</svg>
